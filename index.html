    <!-- Full Screen Image Modal -->

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 right-4 z-50 transform transition-all duration-300 translate-y-[-150%] opacity-0 bg-red-900 border border-red-500 text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-3">
        <i data-lucide="alert-circle" class="w-5 h-5"></i>
        <span id="toast-message" class="text-sm">Error message</span>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // --- Core Configuration ---
        const apiKey = ""; 
        
        // --- State Management ---
        let appState = {
            chats: [], // Array of { id, title, messages: [{ role, text, imageUrl }] }
            currentChatId: null,
            imageHistory: [], // Array of { id, prompt, url }
            inputMode: 'text', // 'text' or 'image'
            isWaitingForResponse: false
        };

        // DOM Elements
        const DOM = {
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebarOverlay'),
            chatContainer: document.getElementById('chat-container'),
            messagesWrapper: document.getElementById('messages-wrapper'),
            welcomeScreen: document.getElementById('welcome-screen'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            modeToggleBtn: document.getElementById('mode-toggle-btn'),
            modeIcon: document.getElementById('mode-icon'),
            modeIndicator: document.getElementById('mode-indicator'),
            currentModelName: document.getElementById('current-model-name'),
            thinkingIndicator: document.getElementById('thinking-indicator'),
            chatHistoryList: document.getElementById('chat-history-list'),
            imageHistoryList: document.getElementById('image-history-list'),
            tabChats: document.getElementById('tab-chats'),
            tabImages: document.getElementById('tab-images'),
            imageModal: document.getElementById('image-modal'),
            modalImage: document.getElementById('modal-image'),
            toast: document.getElementById('toast'),
            toastMessage: document.getElementById('toast-message')
        };

        // --- Initialization ---
        function init() {
            startNewChat();
            renderSidebar();
            // Optional: load from localStorage if desired, but sticking to in-memory as default per guidelines for simple apps unless storage requested.
        }

        // --- API Integration (with Exponential Backoff) ---
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`HTTP error! status: ${response.status} - ${errorData.error?.message || 'Unknown error'}`);
                    }
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    console.log(`Retry ${i + 1}/${retries} after ${delays[i]}ms due to: ${e.message}`);
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function generateTextAPI(messages) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            // Format for Gemini API
            const contents = messages.map(m => ({
                role: m.role === 'ai' ? 'model' : 'user',
                parts: [{ text: m.text }]
            }));

            const payload = { contents };

            const data = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            return data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't generate a response.";
        }

        async function generateImageAPI(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const payload = {
                instances: { prompt: prompt },
                parameters: { sampleCount: 1 }
            };

            const data = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (data.predictions && data.predictions[0]) {
                return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
            }
            throw new Error("Failed to generate image.");
        }

        // --- Core Logic ---

        function startNewChat() {
            const chatId = Date.now().toString();
            appState.chats.unshift({
                id: chatId,
                title: 'New Conversation',
                messages: []
            });
            appState.currentChatId = chatId;
            
            // Reset UI
            DOM.messagesWrapper.innerHTML = '';
            DOM.messagesWrapper.classList.add('hidden');
            DOM.welcomeScreen.classList.remove('hidden');
            DOM.userInput.value = '';
            adjustTextareaHeight(DOM.userInput);
            setMode('text');
            
            if (window.innerWidth < 1024) toggleSidebar(false);
            renderSidebar();
        }

        function loadChat(chatId) {
            appState.currentChatId = chatId;
            const chat = appState.chats.find(c => c.id === chatId);
            
            if (chat.messages.length === 0) {
                DOM.messagesWrapper.classList.add('hidden');
                DOM.welcomeScreen.classList.remove('hidden');
            } else {
                DOM.welcomeScreen.classList.add('hidden');
                DOM.messagesWrapper.classList.remove('hidden');
            }

            renderMessages();
            if (window.innerWidth < 1024) toggleSidebar(false);
            renderSidebar();
        }

        async function handleSend() {
            const text = DOM.userInput.value.trim();
            if (!text || appState.isWaitingForResponse) return;

            // Hide welcome screen
            DOM.welcomeScreen.classList.add('hidden');
            DOM.messagesWrapper.classList.remove('hidden');

            const currentChat = appState.chats.find(c => c.id === appState.currentChatId);
            
            // Generate title if it's the first message
            if (currentChat.messages.length === 0) {
                currentChat.title = text.length > 25 ? text.substring(0, 25) + '...' : text;
                renderSidebar();
            }

            // Add user message to state
            currentChat.messages.push({ role: 'user', text: text });
            
            // Clear input and reset height
            DOM.userInput.value = '';
            adjustTextareaHeight(DOM.userInput);
            
            // Update UI
            renderMessages();
            scrollToBottom();
            setWaitingState(true);

            const mode = appState.inputMode;

            try {
                if (mode === 'text') {
                    // Gather context (last 10 messages to save tokens)
                    const contextMessages = currentChat.messages.filter(m => m.text).slice(-10);
                    const responseText = await generateTextAPI(contextMessages);
                    
                    currentChat.messages.push({ role: 'ai', text: responseText });
                } else if (mode === 'image') {
                    const imageUrl = await generateImageAPI(text);
                    
                    // Add to chat
                    currentChat.messages.push({ 
                        role: 'ai', 
                        text: `Here is the image generated for: "${text}"`,
                        imageUrl: imageUrl 
                    });

                    // Add to image history
                    appState.imageHistory.unshift({
                        id: Date.now().toString(),
                        prompt: text,
                        url: imageUrl
                    });
                    
                    renderImageHistory();
                    
                    // Switch back to text mode after generation
                    setMode('text');
                }
            } catch (error) {
                console.error("API Error:", error);
                showToast(error.message || "An error occurred while generating content.");
                // Add error message to chat
                currentChat.messages.push({ 
                    role: 'ai', 
                    text: `**Error:** ${error.message || "I encountered an issue connecting to the servers. Please try again."}`,
                    isError: true
                });
            } finally {
                setWaitingState(false);
                renderMessages();
                scrollToBottom();
            }
        }

        // --- UI Rendering ---

        function renderMessages() {
            const currentChat = appState.chats.find(c => c.id === appState.currentChatId);
            if (!currentChat) return;

            DOM.messagesWrapper.innerHTML = '';

            currentChat.messages.forEach(msg => {
                const isUser = msg.role === 'user';
                const wrapper = document.createElement('div');
                wrapper.className = `flex gap-4 w-full ${isUser ? 'justify-end' : 'justify-start'}`;

                let innerHTML = '';

                if (isUser) {
                    innerHTML = `
                        <div class="max-w-[80%] bg-dark-surface border border-dark-border rounded-2xl rounded-tr-sm px-4 py-3 shadow-sm text-gray-100 whitespace-pre-wrap break-words">
                            ${escapeHTML(msg.text)}
                        </div>
                    `;
                } else {
                    const parsedText = marked.parse(msg.text || '');
                    const imageHtml = msg.imageUrl ? `
                        <div class="mt-3 relative group">
                            <img src="${msg.imageUrl}" alt="Generated image" class="rounded-xl max-w-full h-auto cursor-pointer border border-dark-border shadow-md" onclick="openImageModal('${msg.imageUrl}')">
                            <button onclick="downloadImage('${msg.imageUrl}', 'omni-image.png')" class="absolute top-2 right-2 p-2 bg-black/60 hover:bg-black/80 text-white rounded-lg opacity-0 group-hover:opacity-100 transition-opacity">
                                <i data-lucide="download" class="w-4 h-4"></i>
                            </button>
                        </div>
                    ` : '';

                    const iconColor = msg.isError ? 'text-red-500' : 'text-white';
                    const iconBg = msg.isError ? 'bg-red-900/50' : 'bg-brand-600';

                    innerHTML = `
                        <div class="w-8 h-8 rounded-full ${iconBg} flex items-center justify-center shrink-0 mt-1">
                            <i data-lucide="sparkles" class="w-4 h-4 ${iconColor}"></i>
                        </div>
                        <div class="max-w-[80%] min-w-0">
                            <div class="prose prose-invert prose-sm md:prose-base max-w-none markdown-body text-gray-200">
                                ${parsedText}
                            </div>
                            ${imageHtml}
                            <div class="flex items-center gap-2 mt-2">
                                <button onclick="copyToClipboard(this)" data-content="${escapeHTML(msg.text)}" class="p-1.5 text-gray-500 hover:text-gray-300 rounded hover:bg-gray-800 transition-colors" title="Copy text">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }

                wrapper.innerHTML = innerHTML;
                DOM.messagesWrapper.appendChild(wrapper);
            });

            // Re-initialize icons for newly added elements
            lucide.createIcons();
        }

        function renderSidebar() {
            // Render Chat History
            DOM.chatHistoryList.innerHTML = '';
            appState.chats.forEach(chat => {
                const btn = document.createElement('button');
                const isActive = chat.id === appState.currentChatId;
                btn.className = `w-full text-left px-3 py-2.5 rounded-lg text-sm truncate transition-colors flex items-center gap-2 group
                    ${isActive ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-800/50 hover:text-gray-200'}`;
                btn.onclick = () => loadChat(chat.id);
                
                btn.innerHTML = `
                    <i data-lucide="message-square" class="w-4 h-4 shrink-0"></i>
                    <span class="truncate flex-1">${escapeHTML(chat.title)}</span>
                `;
                DOM.chatHistoryList.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderImageHistory() {
            DOM.imageHistoryList.innerHTML = '';
            if (appState.imageHistory.length === 0) {
                DOM.imageHistoryList.innerHTML = `<div class="col-span-2 text-center text-sm text-gray-500 mt-4">No images generated yet.</div>`;
                return;
            }

            appState.imageHistory.forEach(img => {
                const div = document.createElement('div');
                div.className = "relative group aspect-square rounded-lg overflow-hidden bg-gray-800 border border-dark-border cursor-pointer";
                div.onclick = () => openImageModal(img.url);
                div.innerHTML = `
                    <img src="${img.url}" class="w-full h-full object-cover" alt="History thumbnail">
                    <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-2">
                        <p class="text-[10px] text-white line-clamp-2 leading-tight">${escapeHTML(img.prompt)}</p>
                    </div>
                `;
                DOM.imageHistoryList.appendChild(div);
            });
        }

        // --- Event Handlers & Helpers ---

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        }

        function adjustTextareaHeight(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 128) + 'px'; // Max height ~128px
        }

        function setInput(text) {
            DOM.userInput.value = text;
            adjustTextareaHeight(DOM.userInput);
            DOM.userInput.focus();
        }

        function toggleMode() {
            setMode(appState.inputMode === 'text' ? 'image' : 'text');
        }

        function setMode(mode) {
            appState.inputMode = mode;
            if (mode === 'image') {
                DOM.modeIcon.setAttribute('data-lucide', 'image');
                DOM.modeIcon.classList.add('text-brand-500');
                DOM.userInput.placeholder = "Describe the image you want...";
                DOM.currentModelName.textContent = "Imagen 4.0";
                
                // Show indicator toast
                DOM.modeIndicator.classList.remove('hidden');
                setTimeout(() => {
                    DOM.modeIndicator.classList.remove('opacity-0');
                    DOM.modeIndicator.classList.add('opacity-100');
                }, 10);
                setTimeout(() => {
                    DOM.modeIndicator.classList.remove('opacity-100');
                    DOM.modeIndicator.classList.add('opacity-0');
                    setTimeout(() => DOM.modeIndicator.classList.add('hidden'), 300);
                }, 3000);

            } else {
                DOM.modeIcon.setAttribute('data-lucide', 'message-square');
                DOM.modeIcon.classList.remove('text-brand-500');
                DOM.userInput.placeholder = "Message Omni Chat...";
                DOM.currentModelName.textContent = "Gemini 2.5 Flash";
            }
            lucide.createIcons();
        }

        function toggleSidebar(forceOpen = null) {
            const isClosed = DOM.sidebar.classList.contains('-translate-x-full');
            const shouldOpen = forceOpen !== null ? forceOpen : isClosed;

            if (shouldOpen) {
                DOM.sidebar.classList.remove('-translate-x-full');
                DOM.sidebarOverlay.classList.remove('hidden');
            } else {
                DOM.sidebar.classList.add('-translate-x-full');
                DOM.sidebarOverlay.classList.add('hidden');
            }
        }

        function switchTab(tab) {
            if (tab === 'chats') {
                DOM.tabChats.className = "flex-1 pb-2 text-sm font-medium border-b-2 border-brand-500 text-brand-500";
                DOM.tabImages.className = "flex-1 pb-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-300";
                DOM.chatHistoryList.classList.remove('hidden');
                DOM.imageHistoryList.classList.add('hidden');
                DOM.imageHistoryList.classList.remove('grid');
            } else {
                DOM.tabImages.className = "flex-1 pb-2 text-sm font-medium border-b-2 border-brand-500 text-brand-500";
                DOM.tabChats.className = "flex-1 pb-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-300";
                DOM.imageHistoryList.classList.remove('hidden');
                DOM.imageHistoryList.classList.add('grid');
                DOM.chatHistoryList.classList.add('hidden');
                renderImageHistory();
            }
        }

        function setWaitingState(isWaiting) {
            appState.isWaitingForResponse = isWaiting;
            DOM.sendBtn.disabled = isWaiting;
            DOM.userInput.disabled = isWaiting;
            
            if (isWaiting) {
                DOM.thinkingIndicator.classList.remove('hidden');
                DOM.sendBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>`;
            } else {
                DOM.thinkingIndicator.classList.add('hidden');
                DOM.sendBtn.innerHTML = `<i data-lucide="arrow-up" class="w-5 h-5"></i>`;
            }
            lucide.createIcons();
        }

        function scrollToBottom() {
            setTimeout(() => {
                DOM.chatContainer.scrollTo({
                    top: DOM.chatContainer.scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);
        }

        function copyToClipboard(btn) {
            const content = btn.getAttribute('data-content');
            // Using older execCommand approach for broader iframe compatibility per instructions
            const textarea = document.createElement('textarea');
            textarea.value = content;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                const icon = btn.querySelector('i');
                icon.setAttribute('data-lucide', 'check');
                icon.classList.add('text-green-500');
                lucide.createIcons();
                setTimeout(() => {
                    icon.setAttribute('data-lucide', 'copy');
                    icon.classList.remove('text-green-500');
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                showToast('Failed to copy text');
            }
            document.body.removeChild(textarea);
        }

        function openImageModal(url) {
            DOM.modalImage.src = url;
            DOM.imageModal.classList.remove('hidden');
            DOM.imageModal.classList.add('flex');
        }

        function closeImageModal() {
            DOM.imageModal.classList.add('hidden');
            DOM.imageModal.classList.remove('flex');
        }

        function downloadImage(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function showToast(message) {
            DOM.toastMessage.textContent = message;
            DOM.toast.classList.remove('translate-y-[-150%]', 'opacity-0');
            
            setTimeout(() => {
                DOM.toast.classList.add('translate-y-[-150%]', 'opacity-0');
            }, 4000);
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Run setup
        init();

    </script>
</body>
</html>
